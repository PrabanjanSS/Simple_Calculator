<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="page-wrapper">
        <div class="header">
            <h1>🧮 My Calculator</h1>
            <p>Simple calculator web app</p>
        </div>

        <div class="main-area">

            <!-- CALCULATOR BOX -->
            <div class="calc-box">
                <div class="display" id="display">0</div>

                <div class="input-row">
                    <input type="number" id="num1" placeholder="First number" />
                </div>

                <div class="operator-row">
                    <button class="op-btn" onclick="setOperator('+')">+</button>
                    <button class="op-btn" onclick="setOperator('-')">−</button>
                    <button class="op-btn" onclick="setOperator('*')">×</button>
                    <button class="op-btn" onclick="setOperator('/')">÷</button>
                </div>

                <div class="selected-op" id="selected-op">No operator selected</div>

                <div class="input-row">
                    <input type="number" id="num2" placeholder="Second number" />
                </div>

                <button class="calc-btn" onclick="calculate()">= Calculate</button>
                <button class="clear-btn" onclick="clearAll()">Clear</button>

                <div id="error-msg"></div>
            </div>

            <!-- HISTORY BOX -->
            <div class="history-box">
                <div class="history-header">
                    <h3>History</h3>
                    <button class="clear-history-btn" onclick="clearHistory()">Clear History</button>
                </div>
                <div id="history-list">
                    <p class="no-history">No calculations yet.</p>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
